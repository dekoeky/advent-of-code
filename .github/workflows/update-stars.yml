name: Update Stars 💫
run-name: Retrieving Stars 💫💫💫

permissions:
  contents: write

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  update-stars:
    name: Update Advent of Code Achieved Stars
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # - name: Install dependencies
      #   run: |
      #     sudo apt-get update
      #     sudo apt-get install -y jq curl

      # - name: Load .env
      #   run: |
      #     set -a
      #     source .env
      #     set +a

      - name: Download Advent of Code HTML pages
        run: ./star-tracking/scripts/download.sh
        env:
          AOC_SESSION: ${{ secrets.AOC_SESSION }}

      - name: Detect HTML changes
        id: html_changed
        run: |
          # if git diff --quiet star-tracking/html; then
          #   echo "changed=false" >> $GITHUB_OUTPUT
          # else
          #   echo "changed=true" >> $GITHUB_OUTPUT
          # fi
          echo "changed=true" >> $GITHUB_OUTPUT

      - name: Stop early if HTML unchanged
        if: steps.html_changed.outputs.changed == 'false'
        run: echo "HTML unchanged — stopping early."

      - name: Parse JSON
        if: steps.html_changed.outputs.changed == 'true'
        run: ./star-tracking/scripts/parse.sh

      - name: Detect JSON changes
        if: steps.html_changed.outputs.changed == 'true'
        id: json_changed
        run: |
          # if git diff --quiet star-tracking/summary.json; then
          #   echo "changed=false" >> $GITHUB_OUTPUT
          # else
          #   echo "changed=true" >> $GITHUB_OUTPUT
          # fi
          echo "changed=true" >> $GITHUB_OUTPUT

      - name: Stop early if JSON unchanged
        if: steps.json_changed.outputs.changed == 'false'
        run: echo "JSON unchanged — stopping early."

      - name: Generate Markdown
        if: steps.json_changed.outputs.changed == 'true'
        run: ./star-tracking/scripts/create-markdown.sh star-tracking/data/json/events.json

      - name: Commit updated markdown
        if: steps.json_changed.outputs.changed == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add star-tracking/*.md
          git commit -m "Update Advent of Code progress" || echo "Nothing to commit"
          git push